services:
  jobs-pg:
    image: postgres:16-alpine
    container_name: maidsclaw-jobs-pg
    restart: unless-stopped
    ports:
      - "55432:5432"
    environment:
      POSTGRES_USER: maidsclaw
      POSTGRES_PASSWORD: maidsclaw
      POSTGRES_DB: maidsclaw_jobs
    volumes:
      - jobs-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maidsclaw -d maidsclaw_jobs"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  jobs-pg-data:
